name: proyecto_5_semestre
description: Migración móvil nativa Android de la plataforma Django a Flutter y Firebase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Componentes Oficiales de Firebase Core y Servicios autorizados
  
  # Gestor de Estado Arquitectónico
  provider: ^6.1.5+1
  
  # Utilidades complementarias
  uuid: ^4.3.3
  flutter_slidable: ^3.1.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  lottie: ^3.0.0
  shared_preferences: ^2.5.5
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.6.4
  flutterfire_cli: ^0.2.7

flutter:
  uses-material-design: true
  assets:
    - lib/assets/lottie/
